<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCampusAPI</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --panel: #ffffff;
            --ink: #102033;
            --muted: #53637a;
            --accent: #0c7bdc;
            --line: #d8e1ec;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #eef4fb 0%, #f9fbfe 50%, #e9f0f8 100%);
            color: var(--ink);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(16, 32, 51, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3.25rem);
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.6;
        }

        .grid {
            display: grid;
            gap: 14px;
            margin-top: 24px;
        }

        .item {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px 18px;
            background: #fbfdff;
        }

        .item strong {
            display: block;
            margin-bottom: 6px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>SmartCampus API</h1>
    <p>This project is now prepared as a Tomcat 9 web application for NetBeans.</p>

    <div class="grid">
        <div class="item">
            <strong>API root</strong>
            <a href="api/v1/">/api/v1/</a>
        </div>
        <div class="item">
            <strong>Rooms</strong>
            <span>/api/v1/rooms</span>
        </div>
        <div class="item">
            <strong>Sensors</strong>
            <span>/api/v1/sensors</span>
        </div>
    </div>
</main>
</body>
</html>
